<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Background terminal window -->
  <rect x="20" y="20" width="360" height="240" rx="12" fill="url(#bg)" stroke="#2a2a4a" stroke-width="1.5" />
  <rect x="20" y="20" width="360" height="36" rx="12" fill="#12122a" stroke="#2a2a4a" stroke-width="1.5" />
  <rect x="20" y="44" width="360" height="12" fill="#12122a" />

  <!-- Window controls -->
  <circle cx="42" cy="38" r="6" fill="#ff5f57" />
  <circle cx="62" cy="38" r="6" fill="#ffbd2e" />
  <circle cx="82" cy="38" r="6" fill="#28c840" />

  <!-- Title -->
  <text x="200" y="43" font-family="monospace" font-size="11" fill="#666" text-anchor="middle">bash — bcli my-app</text>

  <!-- Code lines -->
  <text x="40" y="80" font-family="monospace" font-size="13" fill="#4ade80">$</text>
  <text x="55" y="80" font-family="monospace" font-size="13" fill="#e0e0e0">npm create bcli-app@latest my-tool</text>

  <text x="40" y="105" font-family="monospace" font-size="13" fill="#888">⠋ Creating project...</text>
  <text x="40" y="125" font-family="monospace" font-size="13" fill="#888">⠙ Installing dependencies...</text>

  <text x="40" y="155" font-family="monospace" font-size="13" fill="#4ade80">✔</text>
  <text x="55" y="155" font-family="monospace" font-size="13" fill="#4ade80">Project "my-tool" created!</text>

  <text x="40" y="180" font-family="monospace" font-size="13" fill="#888">$</text>
  <text x="55" y="180" font-family="monospace" font-size="13" fill="#e0e0e0">cd my-tool</text>

  <text x="40" y="205" font-family="monospace" font-size="13" fill="#4ade80">$</text>
  <text x="55" y="205" font-family="monospace" font-size="13" fill="#e0e0e0">npx bcli hello --name Billy</text>

  <text x="40" y="230" font-family="monospace" font-size="13" fill="#00d2ff">Hello, Billy! 👋</text>

  <!-- Blinking cursor -->
  <rect x="250" y="214" width="8" height="14" rx="1" fill="#e0e0e0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>
</svg>
